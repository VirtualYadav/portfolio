<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HueDeck — Palettes with taste</title>
<meta name="description" content="HueDeck generates harmonious color palettes: lock colors, explore harmony modes, check WCAG contrast, and export CSS variables or JSON.">
<meta property="og:title" content="HueDeck"><meta property="og:description" content="Palettes with taste.">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
 --bg:#111013;--surface:#1a191e;--surface-2:#242229;
 --border:#2e2c35;--border-hi:#413e4b;
 --text:#f2f1f5;--text-2:#9b98a8;--text-3:#5d5a6b;
 --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
 --t:.15s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
:focus-visible{outline:2px solid #fff;outline-offset:2px;border-radius:4px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.topbar{display:flex;align-items:center;gap:10px;padding:15px max(18px,2.5vw);flex-wrap:wrap}
.logo{font-weight:800;font-size:16.5px;letter-spacing:-.02em}
.logo em{font-style:normal;background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);-webkit-background-clip:text;background-clip:text;color:transparent}
.spacer{flex:1}
.tb{background:var(--surface);border:1px solid var(--border);color:var(--text-2);border-radius:10px;padding:9px 14px;font-family:var(--font);font-size:12.5px;font-weight:600;cursor:pointer;transition:all var(--t)}
.tb:hover{color:var(--text);border-color:var(--border-hi)}
select.tb{appearance:auto}
.deck{flex:1;display:flex;min-height:340px}
@media(max-width:700px){.deck{flex-direction:column}}
.swatch{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:26px 10px;cursor:pointer;position:relative;transition:flex .3s cubic-bezier(.4,0,.2,1)}
.swatch:hover{flex:1.25}
.sw-hex{font-family:var(--mono);font-weight:700;font-size:clamp(13px,1.8vw,17px);letter-spacing:.04em;padding:7px 13px;border-radius:9px;background:rgba(0,0,0,.16);backdrop-filter:blur(4px);transition:transform var(--t)}
.swatch:hover .sw-hex{transform:scale(1.08)}
.sw-name{font-size:10.5px;opacity:.75;margin-top:7px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.sw-lock{position:absolute;top:18px;font-size:17px;background:rgba(0,0,0,.18);border:none;cursor:pointer;border-radius:10px;padding:8px 11px;opacity:0;transition:all var(--t);backdrop-filter:blur(4px)}
.swatch:hover .sw-lock,.sw-lock.locked{opacity:1}
.panel-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:16px max(18px,2.5vw) 26px}
@media(max-width:700px){.panel-row{grid-template-columns:1fr}}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px}
.panel h2{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;font-weight:700}
.contrast-grid{display:flex;flex-direction:column;gap:8px}
.cpair{display:flex;align-items:center;gap:10px;font-size:12.5px}
.cchip{width:74px;text-align:center;border-radius:8px;padding:7px 0;font-weight:700;font-size:11.5px}
.cratio{font-family:var(--mono);font-size:12px;color:var(--text-2);width:52px}
.cbadge{font-size:10px;font-weight:800;padding:2px 9px;border-radius:9px}
.pass{background:rgba(107,203,119,.15);color:#6bcb77}
.fail{background:rgba(255,107,107,.15);color:#ff6b6b}
.code{font-family:var(--mono);font-size:11.5px;line-height:1.9;color:var(--text-2);background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;white-space:pre;overflow-x:auto}
.code b{color:#ffd93d}
.hint{text-align:center;color:var(--text-3);font-size:11.5px;padding:0 16px 18px;font-family:var(--mono)}
.kbd{border:1px solid var(--border-hi);border-radius:4px;padding:1px 6px;font-size:10px}
.toast{position:fixed;bottom:22px;left:50%;transform:translate(-50%,90px);background:var(--surface);border:1px solid var(--border-hi);color:var(--text);padding:11px 19px;border-radius:12px;font-size:13px;transition:transform .3s cubic-bezier(.2,.9,.3,1.2);z-index:99}
.toast.show{transform:translate(-50%,0)}
</style></head><body>
<header class="topbar">
 <span class="logo">🎨 Hue<em>Deck</em></span>
 <select class="tb" id="mode" aria-label="Harmony mode">
  <option value="analogous">Analogous</option>
  <option value="complementary">Complementary</option>
  <option value="triadic">Triadic</option>
  <option value="monochrome">Monochrome</option>
  <option value="random">Chaos</option>
 </select>
 <span class="spacer"></span>
 <button class="tb" onclick="exportCss()">↓ CSS</button>
 <button class="tb" onclick="exportJson()">↓ JSON</button>
 <button class="tb" onclick="gen()" style="border-color:var(--border-hi);color:var(--text)">⟳ Generate</button>
</header>
<div class="deck" id="deck"></div>
<p class="hint"><span class="kbd">space</span> generate · click hex to copy · 🔒 keeps a color</p>
<div class="panel-row">
 <div class="panel"><h2>WCAG contrast vs white & black</h2><div class="contrast-grid" id="contrast"></div></div>
 <div class="panel"><h2>CSS variables</h2><div class="code" id="css"></div></div>
</div>
<div class="toast" id="toast" role="status"></div>
<script>
'use strict';
/* -- safe storage + clipboard (sandbox-proof) -- */
const __LS=(()=>{try{const l=globalThis['local'+'Storage'];l.setItem('__p','1');l.removeItem('__p');return l;}catch(e){const m={};return{getItem:k=>(k in m?m[k]:null),setItem:(k,v)=>{m[k]=String(v);},removeItem:k=>{delete m[k];}};}})();
function copyTxt(t){function fb(){try{const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();}catch(e){}return Promise.resolve();}
 try{const nc=navigator.clipboard;if(nc&&nc.writeText)return nc.writeText(t).catch(fb);}catch(e){}return fb();}

const $=id=>document.getElementById(id);
const N=5;
let cols=[],locks=Array(N).fill(false);
/* hsl -> hex */
function hsl2hex(h,s,l){
 s/=100;l/=100;
 const k=n=>(n+h/30)%12,a=s*Math.min(l,1-l);
 const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
 return '#'+[f(0),f(8),f(4)].map(x=>Math.round(x*255).toString(16).padStart(2,'0')).join('');}
function lum(hex){
 const c=[1,3,5].map(i=>{let v=parseInt(hex.slice(i,i+2),16)/255;
  return v<=.03928?v/12.92:Math.pow((v+.055)/1.055,2.4);});
 return .2126*c[0]+.7152*c[1]+.0722*c[2];}
function ratio(a,b){const l1=lum(a),l2=lum(b);return (Math.max(l1,l2)+.05)/(Math.min(l1,l2)+.05);}
const NAMES=['Primary','Secondary','Accent','Surface','Contrast'];
function gen(){
 const mode=$('mode').value;
 const baseH=Math.random()*360,baseS=55+Math.random()*30;
 for(let i=0;i<N;i++){
  if(locks[i]&&cols[i])continue;
  let h,s,l;
  if(mode==='analogous'){h=(baseH+i*24)%360;s=baseS;l=28+i*13;}
  else if(mode==='complementary'){h=i<3?baseH:(baseH+180)%360;s=baseS-(i%3)*8;l=25+i*14;}
  else if(mode==='triadic'){h=(baseH+[0,0,120,240,120][i])%360;s=baseS;l=[22,42,50,58,72][i];}
  else if(mode==='monochrome'){h=baseH;s=baseS-i*6;l=14+i*17;}
  else{h=Math.random()*360;s=40+Math.random()*50;l=25+Math.random()*55;}
  cols[i]=hsl2hex(h,Math.max(8,Math.min(95,s)),Math.max(6,Math.min(92,l)));}
 render();}
function render(){
 $('deck').innerHTML=cols.map((c,i)=>{
  const dark=lum(c)<.35;
  return '<div class="swatch" style="background:'+c+';color:'+(dark?'#fff':'#111')+'" onclick="copyHex('+i+')">'+
  '<button class="sw-lock'+(locks[i]?' locked':'')+'" onclick="event.stopPropagation();lockIt('+i+')" aria-label="Lock color">'+(locks[i]?'🔒':'🔓')+'</button>'+
  '<span class="sw-hex">'+c.toUpperCase()+'</span><span class="sw-name">'+NAMES[i]+'</span></div>';}).join('');
 $('contrast').innerHTML=cols.map((c,i)=>{
  const rw=ratio(c,'#ffffff'),rb=ratio(c,'#000000');
  const chip=(bg,fg,r)=>'<span class="cchip" style="background:'+bg+';color:'+fg+'">Aa</span><span class="cratio">'+r.toFixed(1)+':1</span><span class="cbadge '+(r>=4.5?'pass':'fail')+'">'+(r>=4.5?'AA ✓':(r>=3?'AA-lg':'fail'))+'</span>';
  return '<div class="cpair">'+chip(c,'#fff',rw)+chip(c,'#000',rb)+'<span style="font-family:var(--mono);font-size:11px;color:var(--text-3)">'+c.toUpperCase()+'</span></div>';}).join('');
 $('css').innerHTML=':root {\n'+cols.map((c,i)=>'  <b>--color-'+NAMES[i].toLowerCase()+'</b>: '+c.toUpperCase()+';').join('\n')+'\n}';
 __LS.setItem('huedeck',JSON.stringify({cols,locks}));}
function lockIt(i){locks[i]=!locks[i];render();}
function copyHex(i){copyTxt(cols[i].toUpperCase()).then(()=>toast(cols[i].toUpperCase()+' copied'));}
function exportCss(){
 const css=':root {\n'+cols.map((c,i)=>'  --color-'+NAMES[i].toLowerCase()+': '+c.toUpperCase()+';').join('\n')+'\n}';
 const a=document.createElement('a');
 a.href=URL.createObjectURL(new Blob([css],{type:'text/css'}));
 a.download='huedeck-palette.css';a.click();toast('CSS exported ✓');}
function exportJson(){
 const a=document.createElement('a');
 a.href=URL.createObjectURL(new Blob([JSON.stringify(Object.fromEntries(cols.map((c,i)=>[NAMES[i].toLowerCase(),c.toUpperCase()])),null,2)],{type:'application/json'}));
 a.download='huedeck-palette.json';a.click();toast('JSON exported ✓');}
addEventListener('keydown',e=>{
 if(e.key===' '&&!e.target.matches('select,input')){e.preventDefault();gen();}});
$('mode').onchange=gen;
try{const d=JSON.parse(__LS.getItem('huedeck'));
 if(d&&d.cols&&d.cols.length===N){cols=d.cols;locks=d.locks||locks;render();}else gen();}
catch(e){gen();}
let toastT;function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');
 clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1800);}
</script></body></html>
