<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Billforge — Invoices that get paid</title>
<meta name="description" content="Billforge creates clean professional invoices in seconds: line items, taxes, discounts, INR/USD currency, live preview and print-ready PDF export.">
<meta property="og:title" content="Billforge"><meta property="og:description" content="Invoices that get paid.">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
 --bg:#f4f5f7;--surface:#ffffff;--surface-2:#eef0f3;
 --border:#e2e5ea;--border-hi:#cdd3db;
 --text:#141b24;--text-2:#5a6472;--text-3:#9aa3b0;
 --navy:#12263a;--teal:#028090;--teal-dim:#e6f4f5;
 --success:#1a9e6c;--error:#d64550;
 --radius:10px;--radius-lg:16px;
 --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
 --shadow:0 10px 40px rgba(18,38,58,.1);
 --t:.15s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:60px}
:focus-visible{outline:2px solid var(--teal);outline-offset:2px;border-radius:4px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.topbar{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:13px max(20px,3vw)}
.logo{font-weight:800;font-size:16px;letter-spacing:-.02em;display:flex;gap:9px;align-items:center}
.logo .mark{width:26px;height:26px;border-radius:8px;background:var(--navy);color:#fff;display:grid;place-items:center;font-size:12px}
.spacer{flex:1}
.btn{border:none;border-radius:var(--radius);padding:10px 18px;font-family:var(--font);font-weight:700;font-size:13px;cursor:pointer;transition:all var(--t)}
.btn.pri{background:var(--navy);color:#fff}
.btn.pri:hover{background:#1b3a57;transform:translateY(-1px);box-shadow:var(--shadow)}
.btn.ghost{background:var(--surface);color:var(--text-2);border:1px solid var(--border)}
.btn.ghost:hover{color:var(--text);border-color:var(--border-hi)}
.main{max-width:1140px;margin:0 auto;padding:24px max(16px,2.5vw);display:grid;grid-template-columns:400px 1fr;gap:22px}
@media(max-width:940px){.main{grid-template-columns:1fr}}
.form{display:flex;flex-direction:column;gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:0 1px 3px rgba(18,38,58,.05)}
.card h2{font-size:11.5px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:14px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:4px}
input,select,textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:9px 12px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;transition:all var(--t)}
input:focus,select:focus,textarea:focus{border-color:var(--teal);background:#fff;box-shadow:0 0 0 3px var(--teal-dim)}
.item-row{display:grid;grid-template-columns:1fr 64px 84px 30px;gap:8px;margin-bottom:8px;align-items:center}
.item-row .del{background:none;border:none;color:var(--text-3);cursor:pointer;font-size:15px}
.item-row .del:hover{color:var(--error)}
.additem{width:100%;border:1.5px dashed var(--border-hi);background:none;border-radius:var(--radius);padding:10px;font-family:var(--font);font-size:12.5px;color:var(--text-2);cursor:pointer;transition:all var(--t)}
.additem:hover{border-color:var(--teal);color:var(--teal)}
/* invoice preview */
.pv-wrap{position:sticky;top:76px}
.invoice{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:clamp(24px,4vw,46px);animation:rise .4s cubic-bezier(.2,.8,.3,1)}
@keyframes rise{from{opacity:0;transform:translateY(14px)}}
.inv-top{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:34px}
.inv-brand b{font-size:21px;font-weight:800;letter-spacing:-.02em;color:var(--navy)}
.inv-brand p{font-size:12px;color:var(--text-2);margin-top:4px;white-space:pre-line;line-height:1.6}
.inv-no{text-align:right}
.inv-no .big{font-size:26px;font-weight:800;color:var(--teal);letter-spacing:-.02em}
.inv-no p{font-size:12px;color:var(--text-2);margin-top:4px;line-height:1.7}
.inv-bill{margin-bottom:26px}
.inv-bill small{font-size:10px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:.1em}
.inv-bill b{display:block;font-size:15px;margin-top:4px}
.inv-bill p{font-size:12.5px;color:var(--text-2);white-space:pre-line;line-height:1.6}
table.items{width:100%;border-collapse:collapse;margin-bottom:22px}
table.items th{text-align:left;font-size:10px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:.09em;padding:9px 8px;border-bottom:2px solid var(--navy)}
table.items th:last-child,table.items td:last-child{text-align:right}
table.items td{padding:11px 8px;border-bottom:1px solid var(--border);font-size:13.5px}
table.items td.amt{font-family:var(--mono);font-size:12.5px;font-weight:500}
.totals{margin-left:auto;width:min(280px,100%)}
.trow{display:flex;justify-content:space-between;padding:7px 8px;font-size:13px;color:var(--text-2)}
.trow.grand{border-top:2px solid var(--navy);margin-top:6px;padding-top:12px;font-size:17px;font-weight:800;color:var(--navy)}
.trow.grand span:last-child{font-family:var(--mono)}
.inv-notes{margin-top:26px;font-size:12px;color:var(--text-2);border-top:1px solid var(--border);padding-top:14px;white-space:pre-line;line-height:1.7}
.paid-stamp{position:absolute;top:90px;right:60px;transform:rotate(12deg);border:3px solid var(--success);color:var(--success);font-weight:800;font-size:22px;padding:6px 20px;border-radius:8px;opacity:.85;letter-spacing:.1em;display:none}
.invoice{position:relative}
.invoice.paid .paid-stamp{display:block}
@media print{
 body *{visibility:hidden}
 .invoice,.invoice *{visibility:visible}
 .invoice{position:absolute;left:0;top:0;width:100%;box-shadow:none;border-radius:0}}
</style></head><body>
<header class="topbar">
 <span class="logo"><span class="mark">₿</span>Billforge</span>
 <span class="spacer"></span>
 <button class="btn ghost" id="paidBtn" onclick="togglePaid()">Mark paid</button>
 <button class="btn ghost" onclick="saveDraft()">Save draft</button>
 <button class="btn pri" onclick="tryPrint()">🖨 Print / PDF</button>
</header>
<div class="main">
 <div class="form">
  <div class="card"><h2>Your business</h2>
   <div class="field"><label>Name</label><input id="b-name" value="Anuj Yadav" oninput="render()"></div>
   <div class="field"><label>Details (address, email…)</label><textarea id="b-addr" rows="2" oninput="render()">Delhi, India
yadavdm2005@gmail.com</textarea></div>
  </div>
  <div class="card"><h2>Client</h2>
   <div class="field"><label>Name</label><input id="c-name" value="Acme Studios Pvt. Ltd." oninput="render()"></div>
   <div class="field"><label>Details</label><textarea id="c-addr" rows="2" oninput="render()">42 MG Road, Bengaluru
accounts@acme.in</textarea></div>
  </div>
  <div class="card"><h2>Invoice meta</h2>
   <div class="frow">
    <div class="field"><label>Invoice #</label><input id="m-no" value="INV-2026-001" oninput="render()"></div>
    <div class="field"><label>Currency</label><select id="m-cur" onchange="render()"><option value="₹">₹ INR</option><option value="$">$ USD</option><option value="€">€ EUR</option></select></div>
   </div>
   <div class="frow">
    <div class="field"><label>Date</label><input id="m-date" type="date" oninput="render()"></div>
    <div class="field"><label>Due</label><input id="m-due" type="date" oninput="render()"></div>
   </div>
  </div>
  <div class="card"><h2>Line items</h2>
   <div id="items"></div>
   <button class="additem" onclick="addItem()">+ Add line item</button>
  </div>
  <div class="card"><h2>Adjustments & notes</h2>
   <div class="frow">
    <div class="field"><label>Tax %</label><input id="a-tax" type="number" value="18" min="0" max="60" oninput="render()"></div>
    <div class="field"><label>Discount %</label><input id="a-disc" type="number" value="0" min="0" max="100" oninput="render()"></div>
   </div>
   <div class="field"><label>Notes / terms</label><textarea id="a-notes" rows="2" oninput="render()">Payment due within 14 days. UPI: anuj@upi</textarea></div>
  </div>
 </div>
 <div class="pv-wrap"><div class="invoice" id="inv"></div></div>
</div>
<script>
'use strict';
function tryPrint(){try{window.print();}catch(e){safeAlert('Printing is blocked in this preview — on the hosted site this opens the Print → Save as PDF dialog.');}}
/* sandbox-safe confirm/prompt/alert replacements */
function safeConfirm(msg){try{const r=window.confirm(msg);return r;}catch(e){return true;}}
function safeAlert(msg){try{window.alert(msg);}catch(e){
 let el=document.getElementById('__salert');
 if(!el){el=document.createElement('div');el.id='__salert';
  el.style.cssText='position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;background:#1c1c28;color:#fff;border:1px solid #555;border-radius:12px;padding:16px 22px;font:13px/1.7 system-ui;white-space:pre-wrap;max-width:min(480px,90vw);max-height:70vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)';
  document.body.appendChild(el);}
 el.textContent=msg;el.style.display='block';
 clearTimeout(el.__t);el.__t=setTimeout(()=>el.style.display='none',6000);
 el.onclick=()=>el.style.display='none';}}
function safePrompt(msg,def){try{return window.prompt(msg,def);}catch(e){return def;}}

/* -- safe storage + clipboard (sandbox-proof) -- */
const __LS=(()=>{try{const l=globalThis['local'+'Storage'];l.setItem('__p','1');l.removeItem('__p');return l;}catch(e){const m={};return{getItem:k=>(k in m?m[k]:null),setItem:(k,v)=>{m[k]=String(v);},removeItem:k=>{delete m[k];}};}})();
function copyTxt(t){function fb(){try{const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();}catch(e){}return Promise.resolve();}
 try{const nc=navigator.clipboard;if(nc&&nc.writeText)return nc.writeText(t).catch(fb);}catch(e){}return fb();}

const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let items=[],paid=false;
function load(){try{const d=JSON.parse(__LS.getItem('billforge'));
 if(d){items=d.items||[];
  ['b-name','b-addr','c-name','c-addr','m-no','a-notes'].forEach(k=>{if(d[k]!==undefined)$(k).value=d[k];});
  if(d.tax!==undefined)$('a-tax').value=d.tax;
  if(d.disc!==undefined)$('a-disc').value=d.disc;
  paid=!!d.paid;return;}}catch(e){}
 items=[{d:'Website design & development',q:1,p:25000},{d:'Logo design',q:1,p:5000}];}
function saveDraft(){
 __LS.setItem('billforge',JSON.stringify({items,paid,
  'b-name':$('b-name').value,'b-addr':$('b-addr').value,'c-name':$('c-name').value,'c-addr':$('c-addr').value,
  'm-no':$('m-no').value,'a-notes':$('a-notes').value,tax:$('a-tax').value,disc:$('a-disc').value}));
 safeAlert('Draft saved ✓');}
function addItem(){items.push({d:'',q:1,p:0});renderItems();render();}
function delItem(i){items.splice(i,1);renderItems();render();}
function upd(i,k,v){items[i][k]=k==='d'?v:+v||0;render();}
function renderItems(){
 $('items').innerHTML=items.map((it,i)=>
 '<div class="item-row">'+
 '<input placeholder="Description" value="'+esc(it.d)+'" oninput="upd('+i+',\'d\',this.value)">'+
 '<input type="number" min="1" value="'+it.q+'" oninput="upd('+i+',\'q\',this.value)" aria-label="Qty">'+
 '<input type="number" min="0" value="'+it.p+'" oninput="upd('+i+',\'p\',this.value)" aria-label="Price">'+
 '<button class="del" onclick="delItem('+i+')" aria-label="Remove">✕</button></div>').join('');}
function togglePaid(){paid=!paid;$('paidBtn').textContent=paid?'Mark unpaid':'Mark paid';render();}
function render(){
 const cur=$('m-cur').value;
 const F=n=>cur+n.toLocaleString('en-IN',{maximumFractionDigits:2});
 const sub=items.reduce((s,it)=>s+it.q*it.p,0);
 const disc=sub*(+$('a-disc').value||0)/100;
 const tax=(sub-disc)*(+$('a-tax').value||0)/100;
 const grand=sub-disc+tax;
 $('inv').className='invoice'+(paid?' paid':'');
 $('inv').innerHTML='<div class="paid-stamp">PAID</div>'+
 '<div class="inv-top"><div class="inv-brand"><b>'+esc($('b-name').value||'Your Name')+'</b><p>'+esc($('b-addr').value)+'</p></div>'+
 '<div class="inv-no"><div class="big">'+esc($('m-no').value||'INV-001')+'</div>'+
 '<p>Issued: '+($('m-date').value||new Date().toISOString().slice(0,10))+'<br>Due: '+($('m-due').value||'—')+'</p></div></div>'+
 '<div class="inv-bill"><small>Billed to</small><b>'+esc($('c-name').value||'Client')+'</b><p>'+esc($('c-addr').value)+'</p></div>'+
 '<table class="items"><thead><tr><th>Description</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead><tbody>'+
 items.map(it=>'<tr><td>'+esc(it.d||'—')+'</td><td>'+it.q+'</td><td class="amt">'+F(it.p)+'</td><td class="amt">'+F(it.q*it.p)+'</td></tr>').join('')+
 '</tbody></table>'+
 '<div class="totals"><div class="trow"><span>Subtotal</span><span>'+F(sub)+'</span></div>'+
 (disc>0?'<div class="trow"><span>Discount ('+$('a-disc').value+'%)</span><span>−'+F(disc)+'</span></div>':'')+
 '<div class="trow"><span>Tax ('+$('a-tax').value+'%)</span><span>+'+F(tax)+'</span></div>'+
 '<div class="trow grand"><span>Total due</span><span>'+F(grand)+'</span></div></div>'+
 ($('a-notes').value?'<div class="inv-notes">'+esc($('a-notes').value)+'</div>':'');}
$('m-date').value=new Date().toISOString().slice(0,10);
$('m-due').value=new Date(Date.now()+14*864e5).toISOString().slice(0,10);
load();renderItems();render();
$('paidBtn').textContent=paid?'Mark unpaid':'Mark paid';
</script></body></html>
