<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DocTalk — Ask your documents anything</title>
<meta name="description" content="DocTalk turns any document into a conversation: drop a file, ask questions, get instant summaries, key topics and cited passages. Private — everything runs in your browser.">
<meta property="og:title" content="DocTalk"><meta property="og:description" content="Ask your documents anything.">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
 --bg:#0d1117;--bg-2:#131a23;--surface:#1a2230;--surface-2:#222c3d;
 --border:#2a3648;--border-hi:#3b4a61;
 --text:#e6edf3;--text-2:#94a6bb;--text-3:#5b6a7f;
 --primary:#34d399;--primary-dim:rgba(52,211,153,.12);
 --user:#2563eb;
 --error:#f87171;
 --radius:10px;--radius-lg:16px;
 --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
 --t:.15s cubic-bezier(.4,0,.2,1);
 --shadow:0 12px 40px rgba(0,0,0,.45);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow:hidden}
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:4px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:4px}
.topbar{display:flex;align-items:center;gap:12px;padding:13px max(18px,2.5vw);border-bottom:1px solid var(--border);background:var(--bg-2)}
.logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15.5px;letter-spacing:-.01em}
.logo .mark{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--primary),#0ea5e9);display:grid;place-items:center;font-size:13px;color:#04211a}
.private{font-size:11px;color:var(--primary);background:var(--primary-dim);padding:3px 11px;border-radius:12px;font-weight:600}
.spacer{flex:1}
.main{flex:1;display:flex;overflow:hidden}
/* left rail */
.rail{width:290px;flex-shrink:0;background:var(--bg-2);border-right:1px solid var(--border);padding:18px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
@media(max-width:760px){.rail{display:none}}
.drop{border:1.5px dashed var(--border-hi);border-radius:var(--radius-lg);padding:28px 16px;text-align:center;cursor:pointer;transition:all var(--t);color:var(--text-2);font-size:13px;line-height:1.6}
.drop:hover,.drop.over{border-color:var(--primary);background:var(--primary-dim);color:var(--text)}
.drop .ic{font-size:26px;display:block;margin-bottom:8px}
.docmeta{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;font-size:12.5px;display:none}
.docmeta.show{display:block;animation:fadeUp .3s cubic-bezier(.2,.8,.3,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}}
.docmeta b{color:var(--primary);font-size:13px;word-break:break-all}
.stat-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);color:var(--text-2)}
.stat-row:last-child{border:none}
.stat-row b{color:var(--text);font-family:var(--mono);font-size:12px}
.rail .h{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--text-3)}
.qbtn{display:block;width:100%;text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-2);padding:10px 13px;font-family:var(--font);font-size:12.5px;cursor:pointer;transition:all var(--t);margin-bottom:6px}
.qbtn:hover{border-color:var(--primary);color:var(--text);transform:translateX(2px)}
/* chat */
.chat{flex:1;display:flex;flex-direction:column;min-width:0}
.msgs{flex:1;overflow-y:auto;padding:26px max(18px,4vw);display:flex;flex-direction:column;gap:20px}
.msg{display:flex;gap:12px;max-width:820px;animation:msgIn .3s cubic-bezier(.2,.8,.3,1)}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.avatar{width:30px;height:30px;border-radius:9px;flex-shrink:0;display:grid;place-items:center;font-size:13px;font-weight:700}
.msg.ai .avatar{background:linear-gradient(135deg,var(--primary),#0ea5e9);color:#04211a}
.msg.user .avatar{background:var(--user);color:#fff}
.bubble{padding:13px 17px;border-radius:var(--radius-lg);font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.msg.ai .bubble{background:var(--surface);border:1px solid var(--border);border-top-left-radius:4px}
.msg.user .bubble{background:var(--user);border-top-right-radius:4px}
.bubble .cite{display:block;margin-top:10px;padding:10px 13px;background:var(--bg);border-left:3px solid var(--primary);border-radius:6px;font-size:12.5px;color:var(--text-2);font-style:italic}
.bubble b{color:var(--primary)}
.typing{display:inline-flex;gap:5px;padding:6px 2px}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--text-3);animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
/* composer */
.composer{padding:14px max(18px,4vw) 20px;border-top:1px solid var(--border);background:var(--bg-2)}
.crow{display:flex;gap:10px;max-width:820px;margin:0 auto;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:6px 6px 6px 18px;transition:border-color var(--t)}
.crow:focus-within{border-color:var(--primary)}
.crow input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:14.5px;min-width:0}
.crow input::placeholder{color:var(--text-3)}
.send{width:40px;height:40px;border:none;border-radius:10px;background:var(--primary);color:#04211a;font-size:16px;cursor:pointer;transition:all var(--t);flex-shrink:0}
.send:hover{filter:brightness(1.1);transform:scale(1.05)}
.send:disabled{opacity:.4;cursor:not-allowed;transform:none}
.hintline{text-align:center;font-size:11px;color:var(--text-3);margin-top:10px}
</style></head><body>
<header class="topbar">
 <span class="logo"><span class="mark">◆</span>DocTalk</span>
 <span class="private">🔒 on-device analysis</span>
 <span class="spacer"></span>
</header>
<div class="main">
 <aside class="rail">
  <div class="drop" id="drop" role="button" tabindex="0" aria-label="Upload document">
   <span class="ic">📄</span><b>Drop your document</b><br>or click to browse<br>
   <span style="font-size:11px;color:var(--text-3)">.txt · .md · .csv · .json</span></div>
  <input type="file" id="file" accept=".txt,.md,.text,.csv,.json" hidden>
  <div class="docmeta" id="docmeta"></div>
  <div class="h">Documents</div>
  <div id="doclist" style="display:flex;flex-direction:column;gap:5px"></div>
  <div class="h">Quick actions</div>
  <div>
   <button class="qbtn" onclick="ask('Summarize this document')">📝 Summarize</button>
   <button class="qbtn" onclick="ask('What are the key topics?')">🏷 Key topics</button>
   <button class="qbtn" onclick="ask('Show document statistics')">📊 Statistics</button>
   <button class="qbtn" onclick="ask('What are the longest sentences?')">📏 Longest sentences</button>
   <button class="qbtn" onclick="ask('Make flashcards')">🃏 Flashcards</button>
   <button class="qbtn" onclick="ask('Quiz me')">❓ Quiz me</button>
  </div>
  <div class="h">Notes</div>
  <textarea id="notes" placeholder="Jot notes while you read…" style="width:100%;height:80px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px;font-family:var(--font);font-size:12.5px;resize:vertical;outline:none"></textarea>
  <button class="qbtn" onclick="exportChat()">⬇ Export chat + notes</button>
 </aside>
 <section class="chat">
  <div class="msgs" id="msgs" aria-live="polite"></div>
  <div class="composer">
   <div class="crow">
    <button class="send" style="background:var(--surface-2);color:var(--text-2);border:1px solid var(--border)" onclick="document.getElementById('file').click()" aria-label="Attach document" title="Upload document">📎</button>
    <input id="q" placeholder="Ask anything about your document…" aria-label="Question" autocomplete="off">
    <button class="send" id="sendBtn" onclick="send()" aria-label="Send">➤</button>
   </div>
   <div class="hintline">DocTalk analyzes locally with extractive NLP — no data ever leaves your device</div>
  </div>
 </section>
</div>
<script>
'use strict';
/* -- safe storage + clipboard (sandbox-proof) -- */
const __LS=(()=>{try{const l=globalThis['local'+'Storage'];l.setItem('__p','1');l.removeItem('__p');return l;}catch(e){const m={};return{getItem:k=>(k in m?m[k]:null),setItem:(k,v)=>{m[k]=String(v);},removeItem:k=>{delete m[k];}};}})();
function copyTxt(t){function fb(){try{const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();}catch(e){}return Promise.resolve();}
 try{const nc=navigator.clipboard;if(nc&&nc.writeText)return nc.writeText(t).catch(fb);}catch(e){}return fb();}

const $=id=>document.getElementById(id);
let DOC='',NAME='',SENTS=[],FREQ={};
const DOCS={};let chatLog=[];
$('notes')&&($('notes').value=__LS.getItem('doctalk-notes')||'');
const STOP=new Set('this that with from have they their will which been were about there would could these other than when what where your just some more most also each only over such then them can may who whom whose our its his her had has does did been being'.split(' '));
/* upload */
const drop=$('drop'),file=$('file');
drop.onclick=()=>file.click();
drop.onkeydown=e=>{if(e.key==='Enter')file.click();};
['dragover','dragenter'].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('over');}));
['dragleave','drop'].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('over');}));
document.addEventListener('drop',e=>{if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);});
file.onchange=()=>{if(file.files[0])load(file.files[0]);};
function load(f){
 const r=new FileReader();
 r.onload=()=>{DOC=String(r.result);NAME=f.name;DOCS[NAME]=DOC;renderDocs();index();
  const w=DOC.split(/\s+/).length;
  $('docmeta').className='docmeta show';
  $('docmeta').innerHTML='<b>📄 '+esc(NAME)+'</b>'+
  '<div class="stat-row"><span>Words</span><b>'+w.toLocaleString()+'</b></div>'+
  '<div class="stat-row"><span>Sentences</span><b>'+SENTS.length.toLocaleString()+'</b></div>'+
  '<div class="stat-row"><span>Reading time</span><b>~'+Math.max(1,Math.ceil(w/200))+' min</b></div>';
  aiSay('Loaded <b>'+esc(NAME)+'</b> — '+w.toLocaleString()+' words indexed. Ask me anything, or use a quick action on the left.');};
 r.readAsText(f);}
function index(){
 SENTS=DOC.replace(/\s+/g,' ').match(/[^.!?]+[.!?]+/g)||[DOC.slice(0,400)];
 FREQ={};
 (DOC.toLowerCase().match(/[a-z][a-z'-]{3,}/g)||[]).forEach(w=>{if(!STOP.has(w))FREQ[w]=(FREQ[w]||0)+1;});}
/* chat */
function renderDocs(){
 const names=Object.keys(DOCS);
 $('doclist').innerHTML=names.map(n=>
 '<button class="qbtn" style="'+(n===NAME?'border-color:var(--primary);color:var(--text)':'')+'" onclick="switchDoc(\''+n.replace(/'/g,"\\'")+'\')">📄 '+esc(n)+'</button>').join('')
 ||'<span style="font-size:11.5px;color:var(--text-3)">none loaded yet</span>';}
function switchDoc(n){DOC=DOCS[n];NAME=n;index();renderDocs();
 aiSay('Switched to <b>'+esc(n)+'</b> — ask away.');}
function exportChat(){
 const txt='DOCTALK EXPORT — '+new Date().toLocaleString()+'\nDocument: '+NAME+'\n\n'+
 chatLog.map(m=>(m.who==='user'?'YOU: ':'DOCTALK: ')+m.text).join('\n\n')+
 '\n\n--- NOTES ---\n'+($('notes').value||'(none)');
 const a=document.createElement('a');
 a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));
 a.download='doctalk-session.txt';a.click();}
$('notes').addEventListener('input',()=>__LS.setItem('doctalk-notes',$('notes').value));
function addMsg(cls,html){
 chatLog.push({who:cls,text:html.replace(/<[^>]+>/g,'')});
 const m=document.createElement('div');m.className='msg '+cls;
 m.innerHTML='<div class="avatar">'+(cls==='ai'?'◆':'A')+'</div><div class="bubble">'+html+'</div>';
 $('msgs').appendChild(m);$('msgs').scrollTop=$('msgs').scrollHeight;return m;}
function aiSay(html){addMsg('ai',html);}
function ask(q){$('q').value=q;send();}
function send(){
 const q=$('q').value.trim();if(!q)return;
 addMsg('user',esc(q));$('q').value='';
 const t=addMsg('ai','<span class="typing"><span></span><span></span><span></span></span>');
 setTimeout(()=>{t.querySelector('.bubble').innerHTML=answer(q);
  $('msgs').scrollTop=$('msgs').scrollHeight;},500+Math.random()*500);}
const esc=s=>s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
/* NLP answers */
function answer(q){
 if(!DOC)return 'Load a document first — drop a <b>.txt</b>, <b>.md</b>, <b>.csv</b> or <b>.json</b> file on the left panel.';
 const low=q.toLowerCase();
 if(/summar|tldr|overview|about/.test(low)){
  const scored=SENTS.map((s,i)=>({s,i,sc:(s.toLowerCase().match(/[a-z]{4,}/g)||[]).reduce((a,w)=>a+(FREQ[w]||0),0)/Math.max(8,s.split(' ').length)}));
  const top=scored.sort((a,b)=>b.sc-a.sc).slice(0,3).sort((a,b)=>a.i-b.i);
  return '<b>Summary</b> — the 3 most representative sentences:\n\n'+top.map(x=>'• '+esc(x.s.trim())).join('\n\n');}
 if(/topic|keyword|theme|main/.test(low)){
  const top=Object.entries(FREQ).sort((a,b)=>b[1]-a[1]).slice(0,8);
  return '<b>Key topics</b> by frequency:\n\n'+top.map(([w,c],i)=>(i+1)+'. <b>'+esc(w)+'</b> — '+c+' mentions').join('\n');}
 if(/statistic|stats|how (long|many)|count/.test(low)){
  const w=DOC.split(/\s+/).length,para=DOC.split(/\n\s*\n/).length;
  const avg=(w/SENTS.length).toFixed(1);
  return '<b>Document statistics</b>\n\n• '+w.toLocaleString()+' words\n• '+SENTS.length+' sentences (avg '+avg+' words each)\n• '+para+' paragraphs\n• '+DOC.length.toLocaleString()+' characters\n• ~'+Math.max(1,Math.ceil(w/200))+' minute read';}
 if(/longest/.test(low)){
  const top=[...SENTS].sort((a,b)=>b.length-a.length).slice(0,2);
  return '<b>Longest sentences</b>:\n\n'+top.map(s=>'• ('+s.split(' ').length+' words) '+esc(s.trim().slice(0,220))+(s.length>220?'…':'')).join('\n\n');}
 if(/flashcard/.test(low)){
  if(SENTS.length<4)return 'Document too short for flashcards.';
  const top=Object.entries(FREQ).sort((a,b)=>b[1]-a[1]).slice(0,4);
  return '<b>🃏 Flashcards</b> from '+esc(NAME)+':\n\n'+top.map(([w])=>{
   const s=SENTS.find(x=>x.toLowerCase().includes(w))||'';
   return 'Q: What does the document say about “'+esc(w)+'”?\nA: '+esc(s.trim().slice(0,150));}).join('\n\n');}
 if(/quiz/.test(low)){
  if(SENTS.length<4)return 'Document too short for a quiz.';
  const top=Object.entries(FREQ).sort((a,b)=>b[1]-a[1]).slice(0,3);
  return '<b>❓ Quick quiz</b> — answers are in the doc:\n\n'+top.map(([w],i)=>{
   const s=(SENTS.find(x=>x.toLowerCase().includes(w))||'').trim().slice(0,130);
   return (i+1)+'. Fill the blank: “'+esc(s.replace(new RegExp(w,'i'),'_____'))+'”\n   (hint: '+w.length+' letters)';}).join('\n\n');}
 /* passage retrieval */
 const terms=(low.match(/[a-z][a-z'-]{2,}/g)||[]).filter(t=>!STOP.has(t));
 if(terms.length){
  const scored=SENTS.map(s=>{const sl=s.toLowerCase();
   return {s,sc:terms.reduce((a,t)=>a+(sl.includes(t)?1:0),0)};}).filter(x=>x.sc>0);
  scored.sort((a,b)=>b.sc-a.sc);
  if(scored.length)return '<b>Found '+Math.min(3,scored.length)+' relevant passage'+(scored.length>1?'s':'')+'</b> for “'+esc(q)+'”:'+
   scored.slice(0,3).map(x=>'<span class="cite">“'+esc(x.s.trim())+'”</span>').join('');}
 return 'I couldn\'t find anything about that in <b>'+esc(NAME)+'</b>. Try:\n• “summarize”\n• “key topics”\n• a specific word you expect in the text';}
$('q').addEventListener('keydown',e=>{if(e.key==='Enter')send();});
/* welcome */
aiSay('👋 Hi, I\'m <b>DocTalk</b>. Tap the 📎 button (or drop a file on the left panel on desktop) to load any text document — I\'ll index it instantly.\n\nThen ask things like:\n• “Summarize this document”\n• “What are the key topics?”\n• “Find the part about deadlines”');
</script></body></html>
