<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inkpad — Where ideas take shape</title>
<meta name="description" content="Inkpad is a beautifully minimal markdown workspace with live preview, instant search, tags, word-count goals and auto-save. Your thoughts, always safe, always local.">
<meta property="og:title" content="Inkpad"><meta property="og:description" content="A markdown workspace where ideas take shape.">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
 --bg:#fbfaf8;--surface:#ffffff;--surface-2:#f4f2ee;
 --border:#e8e4dd;--border-hi:#d8d2c8;
 --text:#37352f;--text-2:#787066;--text-3:#a99f92;
 --primary:#c05621;--primary-dim:#faf0e6;
 --accent:#2b6cb0;
 --success:#2f855a;--error:#c53030;
 --radius:8px;--radius-lg:12px;
 --font:'Inter',-apple-system,system-ui,sans-serif;
 --serif:'Lora',Georgia,serif;--mono:'JetBrains Mono',monospace;
 --shadow:0 4px 24px rgba(55,53,47,.09);
 --t:.15s cubic-bezier(.4,0,.2,1);
}
[data-theme=dark]{
 --bg:#191919;--surface:#202020;--surface-2:#2a2a2a;
 --border:#333;--border-hi:#444;
 --text:#e8e6e3;--text-2:#9d9891;--text-3:#6f6a63;
 --primary:#e07b39;--primary-dim:#2f2318;
 --shadow:0 4px 24px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;height:100vh;display:flex;overflow:hidden;-webkit-font-smoothing:antialiased;transition:background .3s}
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:4px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:4px}
/* sidebar */
.side{width:260px;flex-shrink:0;background:var(--surface-2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:margin var(--t)}
.side.hidden{margin-left:-260px}
.side-top{padding:16px 16px 10px}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;letter-spacing:-.01em;margin-bottom:14px}
.brand .mark{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,var(--primary),#e07b39);display:grid;place-items:center;color:#fff;font-size:12px}
.search{position:relative}
.search input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px 8px 32px;font-size:13px;font-family:var(--font);color:var(--text);transition:border-color var(--t)}
.search input:focus{border-color:var(--primary);outline:none}
.search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3)}
.notelist{flex:1;overflow-y:auto;padding:6px 8px}
.nitem{padding:10px 12px;border-radius:var(--radius);cursor:pointer;margin-bottom:2px;transition:background var(--t);border:1px solid transparent}
.nitem:hover{background:var(--surface)}
.nitem.on{background:var(--surface);border-color:var(--border);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.nitem b{display:block;font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nitem small{color:var(--text-3);font-size:11.5px}
.nitem .tags{margin-top:4px;display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:10.5px;background:var(--primary-dim);color:var(--primary);padding:1px 8px;border-radius:9px;font-weight:600}
.side-foot{padding:12px;border-top:1px solid var(--border)}
.newnote{width:100%;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);padding:11px;font-family:var(--font);font-size:13.5px;font-weight:600;cursor:pointer;transition:all var(--t)}
.newnote:hover{filter:brightness(1.08);transform:translateY(-1px)}
/* main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.toolbar{display:flex;align-items:center;gap:6px;padding:10px 18px;border-bottom:1px solid var(--border);background:var(--surface)}
.tbtn{border:none;background:none;color:var(--text-2);font-family:var(--font);font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:var(--radius);cursor:pointer;transition:all var(--t)}
.tbtn:hover{background:var(--surface-2);color:var(--text)}
.tbtn.on{background:var(--primary-dim);color:var(--primary)}
.spacer{flex:1}
.status{font-size:12px;color:var(--text-3);display:flex;gap:14px;align-items:center}
.status .saved{color:var(--success)}
.split{flex:1;display:flex;overflow:hidden}
.editor{flex:1;display:flex;flex-direction:column;min-width:0}
.title-in{border:none;background:none;font-family:var(--serif);font-size:28px;font-weight:600;color:var(--text);padding:26px 44px 0;outline:none;letter-spacing:-.01em}
.title-in::placeholder{color:var(--text-3)}
.taginput{border:none;background:none;font-size:12.5px;color:var(--primary);padding:6px 44px;outline:none;font-family:var(--font)}
.taginput::placeholder{color:var(--text-3)}
textarea.body{flex:1;border:none;background:none;outline:none;resize:none;padding:10px 44px 40px;color:var(--text);font-family:var(--mono);font-size:14px;line-height:1.8}
.preview{flex:1;overflow-y:auto;padding:26px 44px 60px;border-left:1px solid var(--border);font-family:var(--serif);font-size:16.5px;line-height:1.85;min-width:0}
.preview h1,.preview h2,.preview h3{font-family:var(--font);letter-spacing:-.02em;margin:22px 0 10px;line-height:1.3}
.preview h1{font-size:26px}.preview h2{font-size:21px}.preview h3{font-size:17px}
.preview p{margin:12px 0}
.preview code{font-family:var(--mono);font-size:13px;background:var(--surface-2);border:1px solid var(--border);padding:1.5px 7px;border-radius:5px;color:var(--primary)}
.preview pre{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;overflow-x:auto;margin:14px 0}
.preview pre code{background:none;border:none;padding:0;color:var(--text)}
.preview blockquote{border-left:3px solid var(--primary);padding:2px 0 2px 18px;color:var(--text-2);font-style:italic;margin:14px 0}
.preview li{margin:5px 0 5px 24px}
.preview a{color:var(--accent)}
.preview strong{font-weight:700}.preview em{font-style:italic}
.preview hr{border:none;border-top:1px solid var(--border);margin:22px 0}
.preview input[type=checkbox]{accent-color:var(--primary);margin-right:8px}
/* empty */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-3);gap:8px}
.empty-state .art{font-size:44px}
.empty-state b{color:var(--text-2);font-size:15px}
/* goal ring */
.goal{display:flex;align-items:center;gap:6px}
.goal svg{transform:rotate(-90deg)}
.goal circle{fill:none;stroke-width:3}
/* responsive */
@media(max-width:820px){.side{position:fixed;z-index:20;height:100vh;box-shadow:var(--shadow)}
.preview{display:none}.preview.solo{display:block;border:none}
.editor.hid{display:none}
.title-in,.taginput{padding-left:24px;padding-right:24px}textarea.body{padding:10px 24px 40px}}
</style></head><body>
<nav class="side" id="side" aria-label="Notes">
 <div class="side-top">
  <div class="brand"><span class="mark">✒︎</span>Inkpad</div>
  <div class="search">
   <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
   <input id="q" placeholder="Search notes… ( / )" autocomplete="off"></div>
 </div>
 <div class="notelist" id="list" role="list"></div>
 <div class="side-foot"><button class="newnote" onclick="newNote()">＋ New note <span style="opacity:.7;font-weight:400">⌘N</span></button></div>
</nav>
<main class="main">
 <div class="toolbar">
  <button class="tbtn" onclick="toggleSide()" aria-label="Toggle sidebar">☰</button>
  <button class="tbtn on" id="mEdit" onclick="setMode('edit')">Write</button>
  <button class="tbtn" id="mSplit" onclick="setMode('split')">Split</button>
  <button class="tbtn" id="mPrev" onclick="setMode('preview')">Read</button>
  <span class="spacer"></span>
  <span class="status">
   <span class="goal" id="goal" title="Daily writing goal: 300 words"></span>
   <span id="wc">0 words</span><span id="saveState" class="saved"></span></span>
  <button class="tbtn" onclick="aiAssist()" title="Writing suggestions">✨ AI</button>
  <button class="tbtn" onclick="exportMd()" title="Download .md">↓ .md</button>
  <button class="tbtn" onclick="exportPdf()" title="Print / Save as PDF">🖨 PDF</button>
  <button class="tbtn" onclick="snapshot()" title="Save version snapshot">⎘</button>
  <button class="tbtn" id="themeBtn" onclick="toggleTheme()" aria-label="Toggle theme">◐</button>
 </div>
 <div class="split" id="split">
  <div class="editor" id="editorPane">
   <input class="title-in" id="title" placeholder="Untitled" autocomplete="off">
   <input class="taginput" id="tags" placeholder="# add tags, comma separated" autocomplete="off">
   <textarea class="body" id="body" placeholder="Write in markdown — **bold**, # headings, - lists, > quotes, ```code```…" spellcheck="true"></textarea>
  </div>
  <div class="preview" id="preview" style="display:none"></div>
 </div>
</main>
<script>
'use strict';
/* sandbox-safe confirm/prompt/alert replacements */
function safeConfirm(msg){try{const r=window.confirm(msg);return r;}catch(e){return true;}}
function safeAlert(msg){try{window.alert(msg);}catch(e){
 let el=document.getElementById('__salert');
 if(!el){el=document.createElement('div');el.id='__salert';
  el.style.cssText='position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;background:#1c1c28;color:#fff;border:1px solid #555;border-radius:12px;padding:16px 22px;font:13px/1.7 system-ui;white-space:pre-wrap;max-width:min(480px,90vw);max-height:70vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)';
  document.body.appendChild(el);}
 el.textContent=msg;el.style.display='block';
 clearTimeout(el.__t);el.__t=setTimeout(()=>el.style.display='none',6000);
 el.onclick=()=>el.style.display='none';}}
function safePrompt(msg,def){try{return window.prompt(msg,def);}catch(e){return def;}}

/* -- safe storage + clipboard (sandbox-proof) -- */
const __LS=(()=>{try{const l=globalThis['local'+'Storage'];l.setItem('__p','1');l.removeItem('__p');return l;}catch(e){const m={};return{getItem:k=>(k in m?m[k]:null),setItem:(k,v)=>{m[k]=String(v);},removeItem:k=>{delete m[k];}};}})();
function copyTxt(t){function fb(){try{const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();}catch(e){}return Promise.resolve();}
 try{const nc=navigator.clipboard;if(nc&&nc.writeText)return nc.writeText(t).catch(fb);}catch(e){}return fb();}

const WELCOME={id:1,title:'Welcome to Inkpad',tags:['guide'],ts:Date.now(),body:
'# Welcome to Inkpad ✒︎\n\nInkpad is your **quiet place to think**. Everything you write is saved automatically — and never leaves this device.\n\n## What it can do\n\n- **Live preview** — hit *Split* in the toolbar\n- `inline code` and code blocks\n- Task lists:\n\n- [x] Try the split view\n- [ ] Write 300 words today (watch the goal ring!)\n- [ ] Make this note yours\n\n> "The scariest moment is always just before you start." — Stephen King\n\n## Shortcuts\n\n- **⌘N** — new note\n- **/** — jump to search\n- **⌘S** — force save (it already auto-saves)\n\n---\n\nHappy writing!'};
let db=load(),mode='edit',saveT;
function load(){try{const d=JSON.parse(__LS.getItem('inkpad2'));if(d&&d.notes&&d.notes.length)return d;}catch(e){}
 return {notes:[WELCOME],cur:1,theme:'light'};}
function persist(){__LS.setItem('inkpad2',JSON.stringify(db));}
const $=id=>document.getElementById(id);
const cur=()=>db.notes.find(n=>n.id===db.cur);
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;');
/* markdown */
function md(src){
 let s=esc(src);
 s=s.replace(/```([\s\S]*?)```/g,(m,c)=>'<pre><code>'+c.trim()+'</code></pre>');
 s=s.replace(/`([^`\n]+)`/g,'<code>$1</code>');
 s=s.replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^## (.*)$/gm,'<h2>$1</h2>').replace(/^# (.*)$/gm,'<h1>$1</h1>');
 s=s.replace(/^---+$/gm,'<hr>');
 s=s.replace(/^> (.*)$/gm,'<blockquote>$1</blockquote>');
 s=s.replace(/^- \[x\] (.*)$/gm,'<li style="list-style:none;margin-left:0"><input type="checkbox" checked disabled>$1</li>');
 s=s.replace(/^- \[ \] (.*)$/gm,'<li style="list-style:none;margin-left:0"><input type="checkbox" disabled>$1</li>');
 s=s.replace(/^[-*] (.*)$/gm,'<li>$1</li>');
 s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*\n]+)\*/g,'<em>$1</em>');
 s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
 return s.split(/\n\n+/).map(p=>/^<(h\d|li|pre|blockquote|hr)/.test(p.trim())?p:'<p>'+p.replace(/\n/g,'<br>')+'</p>').join('\n');}
/* render list */
function renderList(){
 const q=($('q').value||'').toLowerCase();
 const notes=db.notes.filter(n=>!q||n.title.toLowerCase().includes(q)||n.body.toLowerCase().includes(q)||n.tags.some(t=>t.includes(q)))
  .sort((a,b)=>b.ts-a.ts);
 $('list').innerHTML=notes.map(n=>
  '<div class="nitem'+(n.id===db.cur?' on':'')+'" role="listitem" tabindex="0" data-id="'+n.id+'">'+
  '<b>'+esc(n.title||'Untitled')+'</b><small>'+timeago(n.ts)+' · '+(n.body.trim()?n.body.trim().split(/\s+/).length:0)+' words</small>'+
  (n.tags.length?'<span class="tags">'+n.tags.map(t=>'<span class="tag">#'+esc(t)+'</span>').join('')+'</span>':'')+'</div>').join('')
  ||'<div style="padding:20px;text-align:center;color:var(--text-3);font-size:12.5px">No notes match.<br>Press <b>⌘N</b> to create one.</div>';
 $('list').querySelectorAll('.nitem').forEach(el=>{
  el.onclick=()=>open(+el.dataset.id);
  el.onkeydown=e=>{if(e.key==='Enter')open(+el.dataset.id);};});}
function timeago(ts){const s=(Date.now()-ts)/1000;
 if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';
 if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
/* open / edit */
function open(id){db.cur=id;persist();renderList();fill();}
function fill(){const n=cur();if(!n)return;
 $('title').value=n.title;$('tags').value=n.tags.join(', ');$('body').value=n.body;
 updatePreview();updateCount();}
function onEdit(){const n=cur();if(!n)return;
 n.title=$('title').value;n.body=$('body').value;
 n.tags=$('tags').value.split(',').map(t=>t.trim().replace(/^#/,'')).filter(Boolean).slice(0,4);
 n.ts=Date.now();
 $('saveState').textContent='saving…';$('saveState').className='status';
 clearTimeout(saveT);
 saveT=setTimeout(()=>{persist();$('saveState').textContent='✓ saved';$('saveState').className='saved';renderList();},500);
 updatePreview();updateCount();}
['title','tags','body'].forEach(id=>$(id).addEventListener('input',onEdit));
function updatePreview(){if(mode!=='edit')$('preview').innerHTML=md($('body').value);}
function updateCount(){
 const w=$('body').value.trim()?$('body').value.trim().split(/\s+/).length:0;
 $('wc').textContent=w+' words';
 const goal=300,p=Math.min(1,w/goal),r=8,c=2*Math.PI*r;
 $('goal').innerHTML='<svg width="22" height="22"><circle cx="11" cy="11" r="'+r+'" stroke="var(--border-hi)"/>'+
 '<circle cx="11" cy="11" r="'+r+'" stroke="'+(p>=1?'var(--success)':'var(--primary)')+'" stroke-dasharray="'+c+'" stroke-dashoffset="'+(c*(1-p))+'" stroke-linecap="round"/></svg>'+(p>=1?'🎉':'');}
/* modes */
function setMode(m){mode=m;
 $('mEdit').classList.toggle('on',m==='edit');$('mSplit').classList.toggle('on',m==='split');$('mPrev').classList.toggle('on',m==='preview');
 $('preview').style.display=m==='edit'?'none':'block';
 $('preview').classList.toggle('solo',m==='preview');
 $('editorPane').classList.toggle('hid',m==='preview');
 $('editorPane').style.display=m==='preview'?'none':'flex';
 updatePreview();}
/* actions */
function newNote(){const id=Date.now();
 db.notes.push({id,title:'',tags:[],body:'',ts:id});db.cur=id;persist();renderList();fill();
 $('title').focus();}
function snapshot(){const n=cur();if(!n)return;
 n.versions=n.versions||[];
 n.versions.unshift({ts:Date.now(),body:n.body});
 n.versions=n.versions.slice(0,5);persist();
 $('saveState').textContent='✓ snapshot saved ('+n.versions.length+')';}
function exportPdf(){const n=cur();if(!n)return;
 const w=window.open('','_blank');
 if(!w){safeAlert('Popup blocked — allow popups to export PDF. On the hosted site this opens a print dialog.');return;}
 w.document.write('<html><head><title>'+esc(n.title||'Untitled')+'</title><style>body{font-family:Georgia,serif;max-width:660px;margin:44px auto;padding:0 22px;line-height:1.8;color:#222}h1,h2,h3{font-family:system-ui,sans-serif}code{background:#f4f4f4;padding:2px 6px;border-radius:4px}pre{background:#f4f4f4;padding:14px;border-radius:8px}blockquote{border-left:3px solid #c05621;padding-left:14px;color:#666;font-style:italic}</style></head><body><h1>'+esc(n.title||'Untitled')+'</h1>'+md(n.body)+'</body></html>');
 w.document.close();setTimeout(()=>w.print(),300);}
function aiAssist(){const n=cur();if(!n)return;
 const words=n.body.trim()?n.body.trim().split(/\s+/).length:0;
 const sents=n.body.match(/[^.!?]+[.!?]+/g)||[];
 const longS=sents.filter(s=>s.split(' ').length>28).length;
 const tips=[];
 if(words<50)tips.push('📏 Short draft ('+words+' words) — try expanding your main point with an example.');
 if(longS)tips.push('✂️ '+longS+' very long sentence'+(longS>1?'s':'')+' — split for readability.');
 if(!/^#/m.test(n.body))tips.push('🏷 No headings — add a # title to structure the note.');
 if(/very |really |just |basically /.test(n.body.toLowerCase()))tips.push('💬 Filler words detected (very/really/just) — cutting them tightens the prose.');
 if(!/[-*] /m.test(n.body)&&words>120)tips.push('• Long prose — consider a bullet list for scannable points.');
 if(sents.length>3){
  const freq={};(n.body.toLowerCase().match(/[a-z]{4,}/g)||[]).forEach(w2=>freq[w2]=(freq[w2]||0)+1);
  const top=Object.entries(freq).sort((a,b)=>b[1]-a[1])[0];
  if(top&&top[1]>4)tips.push('🔁 “'+top[0]+'” appears '+top[1]+' times — vary the wording.');}
 if(!tips.length)tips.push('✨ Reads well! Clear structure, tidy sentences. Ship it.');
 safeAlert('✨ Writing assistant\n\n'+tips.join('\n\n'));}
function exportMd(){const n=cur();if(!n)return;
 const a=document.createElement('a');
 a.href=URL.createObjectURL(new Blob(['# '+ (n.title||'Untitled')+'\n\n'+n.body],{type:'text/markdown'}));
 a.download=(n.title||'untitled').toLowerCase().replace(/\s+/g,'-')+'.md';a.click();}
function toggleSide(){$('side').classList.toggle('hidden');}
function toggleTheme(){db.theme=db.theme==='dark'?'light':'dark';
 document.documentElement.dataset.theme=db.theme;persist();}
/* shortcuts */
addEventListener('keydown',e=>{
 if((e.metaKey||e.ctrlKey)&&e.key==='n'){e.preventDefault();newNote();}
 if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();persist();$('saveState').textContent='✓ saved';}
 if(e.key==='/'&&!e.target.matches('input,textarea')){e.preventDefault();$('q').focus();}});
$('q').addEventListener('input',renderList);
/* boot */
document.documentElement.dataset.theme=db.theme||'light';
renderList();fill();
</script></body></html>
